# gradle-wrapper.properties — pins the Gradle version used by this project
#
# The wrapper downloads Gradle automatically on first build — no manual
# Gradle installation needed on a new machine.
#
# Current version: Gradle 8.13
#
# To upgrade Gradle: Android Studio → File → Project Structure → Project
# → Gradle Version, or edit distributionUrl below directly.
# After upgrading, also check AGP version compatibility in build.gradle.kts.
#
# This file is committed intentionally — pins the exact Gradle version for
# reproducible builds across all machines.
#
# Related:
#   android/build.gradle.kts    — AGP and Kotlin plugin versions

distributionBase=GRADLE_USER_HOME
distributionPath=wrapper/dists
distributionUrl=https\://services.gradle.org/distributions/gradle-8.13-bin.zip
zipStoreBase=GRADLE_USER_HOME
zipStorePath=wrapper/dists
