# gradle.properties — global Gradle and Android build settings
#
# These apply to all modules in the project.
#
# org.gradle.jvmargs: 2GB heap for the Gradle daemon — Compose compilation
#   is memory-heavy; lower values cause out-of-memory errors during build.
# android.useAndroidX: use AndroidX libraries (required — legacy support libs removed)
# kotlin.code.style=official: enforces Kotlin official style in Android Studio
# android.nonTransitiveRClass: each module only sees its own R class, not
#   transitive dependencies' resources — faster builds, avoids R field conflicts.
#
# Related:
#   android/app/build.gradle.kts    — dependency and SDK version config

org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
android.useAndroidX=true
kotlin.code.style=official
android.nonTransitiveRClass=true
